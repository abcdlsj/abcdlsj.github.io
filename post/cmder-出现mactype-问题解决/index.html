<p>MacType 出现问题解决</p>

<p>安装Cmder 之后出现了</p>
<p><img  src="https://graph-bed-1256708472.cos.ap-chengdu.myqcloud.com/20190111192241.png"
        alt/></p>
<p>经过查询我们知道</p>
<p><img  src="https://graph-bed-1256708472.cos.ap-chengdu.myqcloud.com/20190111192404.png"
        alt/></p>
<p>所以打开你的MacType配置文件</p>
<p><img  src="https://graph-bed-1256708472.cos.ap-chengdu.myqcloud.com/20190111192615.png"
        alt/></p>
<p>找到</p>
<p><img  src="https://graph-bed-1256708472.cos.ap-chengdu.myqcloud.com/20190111193124.png"
        alt/></p>
<p>加入<code>ConEmuC.exe</code>&amp;<code>ConEmuC64.exe</code></p>
<p><img  src="https://graph-bed-1256708472.cos.ap-chengdu.myqcloud.com/20190111193211.png"
        alt/></p>
<p>然后应用配置,重启就行了</p>
